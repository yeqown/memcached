name: GUI Release

on:
  release:
    types: [created]
    tags:
      - 'v*-gui*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0-gui)'
        required: true
        default: 'v1.0.0-gui'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build GUI
        working-directory: gui
        run: wails build -platform darwin/${{ matrix.arch }} -o memcached-gui-${{ matrix.arch }}.app

      - name: Create archive
        working-directory: gui/build/bin
        run: zip -r memcached-gui-macos-${{ matrix.arch }}.zip memcached-gui-${{ matrix.arch }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: gui/build/bin/memcached-gui-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build GUI
        working-directory: gui
        run: wails build -platform windows/amd64 -o memcached-gui-amd64.exe

      - name: Create archive
        working-directory: gui/build/bin
        run: Compress-Archive -Path memcached-gui-amd64.exe -DestinationPath memcached-gui-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: gui/build/bin/memcached-gui-windows-amd64.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build GUI
        working-directory: gui
        run: wails build -platform linux/${{ matrix.arch }} -o memcached-gui-${{ matrix.arch }}

      - name: Create archive
        working-directory: gui/build/bin
        run: tar -czvf memcached-gui-linux-${{ matrix.arch }}.tar.gz memcached-gui-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: gui/build/bin/memcached-gui-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS amd64
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64
          path: ./release

      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: ./release

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: ./release

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: ./release

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: ./release

      - name: List release files
        run: ls -la ./release

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: ./release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
